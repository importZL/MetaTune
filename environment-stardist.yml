# Separate environment for StarDist (TensorFlow-based; conflicts with cu121 torch).
# Build with:
#   conda env create -f environment-stardist.yml
#   conda activate stardist

name: stardist
channels:
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    - tensorflow[and-cuda]==2.21.0
    - stardist==0.9.2
    - csbdeep==0.8.2
    - scikit-image>=0.21
    - scikit-learn==1.3.2
    - numpy>=1.22
    - scipy
    - opencv-python
    - imagecodecs
    - matplotlib
    - tqdm
    - tensorboard==2.20.0
    # cellpose is also installed here so we can reuse cellpose.metrics.average_precision
    # for an apples-to-apples evaluation against the other baselines.
    - cellpose==4.1.1
