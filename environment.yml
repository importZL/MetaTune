# MetaTune main env (covers training, inference, and most baselines)
# Build with:
#   conda env create -f environment.yml
#   conda activate metatune
#
# For StarDist (TensorFlow-based) use the separate environment-stardist.yml.

name: metatune
channels:
  - pytorch
  - nvidia
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    # PyTorch with CUDA 12.1
    - --extra-index-url https://download.pytorch.org/whl/cu121
    - torch==2.5.1+cu121
    - torchvision==0.20.1+cu121
    # MetaTune core
    - segment-anything==1.0
    - einops==0.8.2
    - h5py==3.16.0
    - icecream==2.2.0
    - imagecodecs==2025.3.30
    - imageio==2.37.3
    - medpy==0.5.2
    - monai==1.5.2
    - ml-collections==1.1.0
    - nibabel==5.4.2
    - numpy<2.0
    - opencv-python<4.10
    - Pillow>=10.0
    - pycocotools==2.0.7
    - safetensors==0.7.0
    - scipy==1.10.1
    - scikit-image>=0.21
    - scikit-learn==1.3.2
    - SimpleITK==2.5.5
    - tensorboard==2.20.0
    - tensorboardX==2.6.5
    - timm==1.0.27
    - torchmetrics==1.9.0
    - tqdm==4.67.3
    - wandb==0.27.0
    # Instance-segmentation baselines (Cellpose family + cpsam+BLO-SAM-bilevel)
    - cellpose==4.1.1
    - fastremap==1.19.0
    - fill-voids==2.1.2
    - roifile==2025.12.12
    - numba==0.65.1
    - llvmlite==0.47.0
